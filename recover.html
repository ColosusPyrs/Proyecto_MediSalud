<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar Contraseña – MediSalud</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: {
        primary: { DEFAULT: '#1F6FB5', dark: '#0F4C81', light: '#6EC1FF' },
        accent: '#4CAF50'
      }}}
    }
  </script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gradient-to-br from-blue-50 to-blue-100 min-h-screen font-sans">

  <!-- ===== HEADER (simplificado, sin sesión) ===== -->
  <header class="bg-white shadow-md">
    <div class="max-w-7xl mx-auto px-4 md:px-6">
      <div class="flex justify-between items-center py-3">
        <a href="inicio.html">
          <img src="img/Logo .png" alt="MediSalud" class="h-14 md:h-20 object-contain">
        </a>
        <div class="hidden md:flex gap-3">
          <a href="login.html"    class="text-sm font-semibold text-primary border border-primary px-4 py-1.5 rounded-full hover:bg-blue-50 transition">Iniciar sesión</a>
          <a href="register.html" class="text-sm font-semibold text-white bg-primary hover:bg-primary-dark px-4 py-1.5 rounded-full transition">Registrarse</a>
        </div>
      </div>
    </div>
  </header>
  <!-- ===== FIN HEADER ===== -->


  <!-- ===== FORMULARIO RECUPERAR CONTRASEÑA ===== -->
  <main class="flex items-center justify-center min-h-[calc(100vh-120px)] px-4 py-16">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md p-10">

      <!-- Icono y título -->
      <div class="flex flex-col items-center mb-8">
        <div class="w-16 h-16 bg-yellow-100 rounded-full flex items-center justify-center mb-4">
          <svg class="w-8 h-8 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
          </svg>
        </div>
        <h2 class="text-2xl font-bold text-primary-dark">Recuperar Contraseña</h2>
        <p class="text-gray-400 text-sm mt-1 text-center">Ingresa tu email y te mostraremos tu contraseña registrada.</p>
      </div>

      <!-- Paso 1: buscar por email -->
      <div id="paso-1">
        <div class="flex flex-col gap-4">
          <div>
            <label class="block text-sm font-semibold text-gray-600 mb-1">Correo electrónico</label>
            <input type="email" id="recover-email" placeholder="tu@email.com"
              class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition text-sm">
          </div>
          <button onclick="buscarCuenta()"
            class="w-full bg-primary hover:bg-primary-dark text-white font-bold py-3 rounded-xl transition shadow-md">
            Buscar cuenta
          </button>
          <div id="msg-recover" style="display:none;"></div>
        </div>
      </div>

      <!-- Paso 2: mostrar contraseña encontrada -->
      <div id="paso-2" style="display:none;" class="flex flex-col gap-4 text-center">
        <div class="bg-green-50 border border-green-200 rounded-xl p-5">
          <p class="text-sm text-gray-500 mb-1">Cuenta encontrada para</p>
          <p id="resultado-email"  class="font-semibold text-gray-700 text-sm mb-3"></p>
          <p class="text-sm text-gray-500 mb-1">Tu contraseña es</p>
          <p id="resultado-password" class="text-xl font-bold text-primary-dark tracking-widest"></p>
        </div>
        <a href="login.html" class="w-full bg-primary hover:bg-primary-dark text-white font-bold py-3 rounded-xl transition shadow-md text-center block">
          Ir a iniciar sesión
        </a>
      </div>

      <!-- Enlace volver -->
      <p class="text-center text-sm text-gray-500 mt-6">
        <a href="login.html" class="text-primary font-semibold hover:underline">← Volver al inicio de sesión</a>
      </p>

    </div>
  </main>
  <!-- ===== FIN FORMULARIO ===== -->


  <!-- ===== FOOTER ===== -->
  <footer class="bg-primary-dark text-white">
    <div class="max-w-7xl mx-auto px-6 py-6 flex flex-col md:flex-row justify-between items-center gap-4 text-sm text-blue-200">
      <span>© 2026 MediSalud. Todos los derechos reservados.</span>
      <div class="flex gap-5">
        <a href="privacidad.html" class="hover:text-white transition">Políticas de privacidad</a>
        <a href="terminos.html"   class="hover:text-white transition">Términos de uso</a>
      </div>
    </div>
  </footer>
  <!-- ===== FIN FOOTER ===== -->


  <!-- ===== JAVASCRIPT ===== -->
  <script>

    /* -------------------------------------------------------
       BUSCAR CUENTA POR EMAIL
       Busca en ms_usuarios el email introducido.
       Si lo encuentra, muestra la contraseña guardada.
       (En producción real nunca se mostraría la contraseña
        en texto plano; aquí es aceptable al ser LocalStorage.)
    ------------------------------------------------------- */
    function buscarCuenta() {
      const email    = document.getElementById('recover-email').value.trim();
      const msgDiv   = document.getElementById('msg-recover');

      if (!email) {
        mostrarMensaje(msgDiv, 'Por favor, ingresa tu correo electrónico.', 'error');
        return;
      }

      const usuarios  = JSON.parse(localStorage.getItem('ms_usuarios') || '[]');
      const encontrado = usuarios.find(u => u.email.toLowerCase() === email.toLowerCase());

      if (encontrado) {
        // Ocultar paso 1 y mostrar paso 2 con los datos
        document.getElementById('paso-1').style.display           = 'none';
        document.getElementById('paso-2').style.display           = 'flex';
        document.getElementById('resultado-email').textContent    = encontrado.email;
        document.getElementById('resultado-password').textContent = encontrado.password;
      } else {
        mostrarMensaje(msgDiv, 'No encontramos ninguna cuenta con ese correo.', 'error');
      }
    }

    /* -------------------------------------------------------
       MOSTRAR MENSAJE DE ERROR
    ------------------------------------------------------- */
    function mostrarMensaje(elemento, texto, tipo) {
      elemento.textContent      = texto;
      elemento.style.display    = 'block';
      elemento.style.color      = tipo === 'error' ? '#e53e3e' : '#4CAF50';
      elemento.style.fontWeight = '600';
      elemento.style.fontSize   = '0.875rem';
      elemento.style.marginTop  = '4px';
    }

    /* -------------------------------------------------------
       PERMITIR BUSCAR CON LA TECLA ENTER
    ------------------------------------------------------- */
    document.getElementById('recover-email').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') buscarCuenta();
    });

  </script>
  <!-- ===== FIN JAVASCRIPT ===== -->

  <script src="main.js"></script>
</body>
</html>
